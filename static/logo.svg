<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-labelledby="title desc">
  <title id="title">DS4 Dwarfstar telemetry logo</title>
  <desc id="desc">A white dwarf core with lensing rings, accretion disk, terminal-green telemetry ticks, and cyan glow.</desc>
  <defs>
    <!-- Animated white dwarf glow -->
    <radialGradient id="wdGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1">
        <animate attributeName="stop-opacity" values="1;0.7;1" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="15%" stop-color="#cceeff" stop-opacity="0.8">
        <animate attributeName="stop-opacity" values="0.8;0.5;0.8" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="40%" stop-color="#00ccff" stop-opacity="0.3">
        <animate attributeName="stop-opacity" values="0.3;0.15;0.3" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="70%" stop-color="#00ff41" stop-opacity="0.1">
        <animate attributeName="stop-opacity" values="0.1;0.05;0.1" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Gravitational lensing ring -->
    <radialGradient id="lensingRing" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="70%" stop-color="#00ff41" stop-opacity="0.15">
        <animate attributeName="stop-opacity" values="0.15;0.25;0.15" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="75%" stop-color="#00ff41" stop-opacity="0.3">
        <animate attributeName="stop-opacity" values="0.3;0.5;0.3" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="80%" stop-color="#00ff41" stop-opacity="0.15">
        <animate attributeName="stop-opacity" values="0.15;0.25;0.15" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="85%" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Accretion disk -->
    <linearGradient id="accretionDisk" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00d4ff" stop-opacity="0.4"/>
      <stop offset="35%" stop-color="#00ff41" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#00ff41" stop-opacity="0.8"/>
      <stop offset="65%" stop-color="#00ff41" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#00d4ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Star glow filter -->
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Core pulse filter -->
    <filter id="corePulse">
      <feGaussianBlur stdDeviation="1.5" result="blur">
        <animate attributeName="stdDeviation" values="1.5;2.5;1.5" dur="3s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      @keyframes twinkle1 { 0%,100% { opacity: 0.3; } 50% { opacity: 0.7; } }
      @keyframes twinkle2 { 0%,100% { opacity: 0.4; } 50% { opacity: 0.2; } }
      @keyframes twinkle3 { 0%,100% { opacity: 0.5; } 33% { opacity: 0.2; } 66% { opacity: 0.8; } }
      @keyframes rotateDisk { from { transform: rotate(-15deg); } to { transform: rotate(345deg); } }
      @keyframes rotateDiskInv { from { transform: rotate(15deg); } to { transform: rotate(375deg); } }
      @keyframes pulseHalo { 0%,100% { opacity: 0.15; } 50% { opacity: 0.25; } }
      @keyframes lensedStarPulse { 0%,100% { opacity: 0.6; } 50% { opacity: 0.9; } }
      @keyframes coronaPulse { 0%,100% { opacity: 0.6; } 50% { opacity: 0.3; } }
    </style>
  </defs>

  <!-- Background: deep space -->
  <rect width="200" height="200" fill="#0a0a0a"/>

  <!-- Distant stars (subtle, twinkling) -->
  <circle cx="30" cy="25" r="0.5" fill="#808080" filter="url(#starGlow)">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="30" r="0.6" fill="#808080" filter="url(#starGlow)">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="15" cy="160" r="0.4" fill="#808080" filter="url(#starGlow)">
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="185" cy="170" r="0.5" fill="#808080" filter="url(#starGlow)">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="45" cy="180" r="0.3" fill="#808080" filter="url(#starGlow)">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="155" cy="15" r="0.4" fill="#808080" filter="url(#starGlow)">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="10" r="0.3" fill="#808080" filter="url(#starGlow)">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="190" cy="100" r="0.4" fill="#808080" filter="url(#starGlow)">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="10" cy="90" r="0.3" fill="#808080" filter="url(#starGlow)">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.1s" repeatCount="indefinite"/>
  </circle>

  <!-- Gravitational lensing rings -->
  <ellipse cx="100" cy="100" rx="85" ry="85" fill="url(#lensingRing)"/>
  <ellipse cx="100" cy="100" rx="60" ry="60" fill="url(#lensingRing)"/>

  <!-- Telemetry tick ring -->
  <g opacity="0.75">
    <animate attributeName="opacity" values="0.55;0.85;0.55" dur="3.4s" repeatCount="indefinite"/>
    <line x1="100" y1="16" x2="100" y2="24" stroke="#00ff41" stroke-width="1"/>
    <line x1="100" y1="176" x2="100" y2="184" stroke="#00ff41" stroke-width="1"/>
    <line x1="16" y1="100" x2="24" y2="100" stroke="#00ff41" stroke-width="1"/>
    <line x1="176" y1="100" x2="184" y2="100" stroke="#00ff41" stroke-width="1"/>
    <line x1="40" y1="40" x2="46" y2="46" stroke="#00d4ff" stroke-width="0.8"/>
    <line x1="154" y1="154" x2="160" y2="160" stroke="#00d4ff" stroke-width="0.8"/>
    <line x1="154" y1="46" x2="160" y2="40" stroke="#00d4ff" stroke-width="0.8"/>
    <line x1="40" y1="160" x2="46" y2="154" stroke="#00d4ff" stroke-width="0.8"/>
  </g>

  <!-- Outer halo with pulse -->
  <circle cx="100" cy="100" r="40" fill="none" stroke="#00ff41" stroke-width="0.3">
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Accretion disk (rotating) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="12s" repeatCount="indefinite"/>
    <ellipse cx="100" cy="100" rx="70" ry="18" fill="url(#accretionDisk)" transform="rotate(-15, 100, 100)" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.7;0.6" dur="6s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- White dwarf core with pulsing glow -->
  <circle cx="100" cy="100" r="12" fill="url(#wdGlow)" filter="url(#corePulse)"/>
  
  <!-- Intense white core point -->
  <circle cx="100" cy="100" r="4" fill="#ffffff">
    <animate attributeName="opacity" values="0.9;0.7;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="100" r="2" fill="#ffffff">
    <animate attributeName="opacity" values="1;0.8;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Corona rays -->
  <g opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.3;0.6" dur="4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="20s" repeatCount="indefinite"/>
    <line x1="100" y1="82" x2="100" y2="76" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="100" y1="118" x2="100" y2="124" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="82" y1="100" x2="76" y2="100" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="118" y1="100" x2="124" y2="100" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="87" y1="87" x2="82" y2="82" stroke="#00d4ff" stroke-width="0.4"/>
    <line x1="113" y1="113" x2="118" y2="118" stroke="#00d4ff" stroke-width="0.4"/>
    <line x1="113" y1="87" x2="118" y2="82" stroke="#00d4ff" stroke-width="0.4"/>
    <line x1="87" y1="113" x2="82" y2="118" stroke="#00d4ff" stroke-width="0.4"/>
  </g>

  <!-- Gravitationally distorted background stars (lensed) -->
  <circle cx="140" cy="65" r="0.6" fill="#00ff41" filter="url(#starGlow)">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="135" cy="70" r="0.4" fill="#00ff41" filter="url(#starGlow)">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="135" r="0.5" fill="#00ff41" filter="url(#starGlow)">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="65" cy="130" r="0.3" fill="#00ff41" filter="url(#starGlow)">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</svg>

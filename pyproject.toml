[tool.pytest.ini_options]
# Add the repo root to sys.path so tests can `import dashboard` and friends
# without per-module sys.path manipulation. Pairs with tests/conftest.py which
# keeps the path trick working for callers that don't go through pytest.
pythonpath = ["."]
testpaths = ["tests"]

[tool.mypy]
python_version = "3.9"
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true
check_untyped_defs = true
ignore_missing_imports = false

# Third-party libraries without shipped type stubs. These are either optional
# dev-time helpers (uvicorn, fastapi.testclient) or libraries that ship their
# stubs in a separate types-* package on PyPI (yaml -> types-PyYAML). For the
# latter, prefer installing types-PyYAML in dev deps; the override here is a
# safety net so a CI without types-PyYAML installed still type-checks.
[[tool.mypy.overrides]]
module = ["uvicorn", "fastapi.testclient", "yaml"]
ignore_missing_imports = true
